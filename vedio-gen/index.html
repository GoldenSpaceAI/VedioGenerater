<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shorts Forge — Faris</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #2a2a2a;
      --gold: #d4a53a;
      --gold-light: #e8c547;
      --gold-dark: #b8922e;
      --text: #e0e0e0;
      --text-muted: #777;
      --danger: #c0392b;
      --success: #27ae60;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    .chat-panel {
      width: 30%;
      min-width: 340px;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-right: 1px solid var(--border);
    }

    .chat-header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(0,0,0,0.3);
    }

    .chat-header .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 8px rgba(39, 174, 96, 0.5);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .chat-header h3 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--gold);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .chat-messages::-webkit-scrollbar { width: 3px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .message {
      max-width: 88%;
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 12.5px;
      line-height: 1.6;
      word-wrap: break-word;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      background: linear-gradient(135deg, #1a1a1a, #1f1f1f);
      align-self: flex-end;
      border: 1px solid #333;
      border-radius: 14px 14px 4px 14px;
    }

    .message.assistant {
      background: linear-gradient(135deg, #151515, #1a1a1a);
      align-self: flex-start;
      border: 1px solid #2a2a2a;
      border-radius: 14px 14px 14px 4px;
      border-left: 2px solid var(--gold-dark);
    }

    .chat-input-area {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      background: rgba(0,0,0,0.2);
    }

    .chat-input-area input {
      flex: 1;
      padding: 11px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: #fff;
      border-radius: 24px;
      font-size: 12.5px;
      outline: none;
      transition: border 0.2s;
    }

    .chat-input-area input:focus { border-color: var(--gold-dark); }
    .chat-input-area input::placeholder { color: #444; }

    .btn-send {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-dark), var(--gold));
      color: #000;
      border: none;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, box-shadow 0.15s;
      flex-shrink: 0;
    }

    .btn-send:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(212, 165, 58, 0.3);
    }

    .video-panel {
      width: 70%;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 28px 32px;
      background: radial-gradient(ellipse at top right, #0f0f0f 0%, var(--bg) 60%);
    }

    .video-panel::-webkit-scrollbar { width: 4px; }
    .video-panel::-webkit-scrollbar-track { background: transparent; }
    .video-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .brand-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--gold-dark), var(--gold));
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .brand h2 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .brand h2 span { color: var(--gold); }

    .section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--gold);
      margin-bottom: 8px;
      margin-top: 24px;
      font-weight: 600;
    }

    .section-label:first-of-type { margin-top: 0; }

    textarea {
      width: 100%;
      padding: 16px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: #ddd;
      border-radius: 10px;
      font-size: 13.5px;
      resize: vertical;
      min-height: 110px;
      font-family: inherit;
      outline: none;
      transition: border 0.2s;
      line-height: 1.6;
    }

    textarea:focus { border-color: var(--gold-dark); }
    textarea::placeholder { color: #3a3a3a; }

    .info-row {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .stat-badge {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 10px 18px;
      border-radius: 24px;
      font-size: 12px;
      color: #aaa;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stat-badge .value {
      color: var(--gold-light);
      font-weight: 600;
    }

    .scene-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 4px;
    }

    .scene-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 12px;
      color: #999;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .scene-item.found {
      border-left: 3px solid var(--gold);
      color: #ccc;
    }

    .scene-item .scene-num {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: #888;
      flex-shrink: 0;
    }

    .scene-item.found .scene-num {
      background: var(--gold-dark);
      color: #000;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      margin-left: auto;
    }

    .status-dot.pending { background: #444; }
    .status-dot.fetched { background: var(--gold); }
    .status-dot.failed { background: var(--danger); }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .btn {
      padding: 12px 22px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.15s;
      font-family: inherit;
    }

    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--gold-dark), var(--gold));
      color: #000;
    }

    .btn-primary:hover:not(:disabled) {
      box-shadow: 0 0 24px rgba(212, 165, 58, 0.25);
      transform: translateY(-1px);
    }

    .btn-record {
      background: var(--danger);
      color: #fff;
    }

    .btn-record:hover:not(:disabled) {
      box-shadow: 0 0 24px rgba(192, 57, 43, 0.4);
    }

    .btn-record.recording {
      animation: recordPulse 1s infinite;
    }

    @keyframes recordPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(192, 57, 43, 0.6); }
      50% { box-shadow: 0 0 0 12px rgba(192, 57, 43, 0); }
    }

    .status-message {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 20px;
    }

    .countdown-overlay {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 80px;
      font-weight: 900;
      color: var(--gold);
      z-index: 999;
      display: none;
      text-shadow: 0 0 40px rgba(212, 165, 58, 0.6);
    }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #333;
      border-top: 2px solid var(--gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 800px) {
      body { flex-direction: column; }
      .chat-panel, .video-panel { width: 100%; min-width: unset; }
      .chat-panel { max-height: 35vh; }
    }
  </style>
</head>
<body>

  <div class="chat-panel">
    <div class="chat-header">
      <div class="dot"></div>
      <h3>AI Script Studio</h3>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="message assistant">
        👋 Hey Faris! I can help write scripts, titles, and hooks for your Shorts. Just tell me your topic.
      </div>
    </div>
    <div class="chat-input-area">
      <input type="text" id="chatInput" placeholder="Ask me anything..." onkeydown="if(event.key==='Enter')sendChat()">
      <button class="btn-send" onclick="sendChat()">➤</button>
    </div>
  </div>

  <div class="video-panel">
    <div class="brand">
      <div class="brand-icon">⚡</div>
      <h2>Shorts <span>Forge</span></h2>
    </div>

    <div class="section-label">📝 Your Script</div>
    <textarea id="scriptInput" placeholder="Paste your voiceover script here...&#10;&#10;1. We'll extract scenes and fetch videos&#10;2. You record your voiceover&#10;3. Server stitches everything into an MP4 for YouTube Shorts"></textarea>

    <div class="info-row">
      <div class="stat-badge">🎬 Scenes: <span class="value" id="sceneCount">—</span></div>
      <div class="stat-badge">⏱ Est. Duration: <span class="value" id="estDuration">—</span></div>
      <div class="stat-badge">📹 Clips: <span class="value" id="clipsFound">—</span></div>
      <div class="stat-badge" id="recordingBadge" style="display:none;">🎙️ Recording: <span class="value" id="recordingTime">0s</span></div>
    </div>

    <div class="section-label">🎞️ Scene Breakdown</div>
    <div class="scene-list" id="sceneList">
      <div class="scene-item"><span class="scene-num">—</span> Paste your script and generate scenes first</div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="btnScenes" onclick="extractScenes()">🔍 Extract Scenes</button>
      <button class="btn btn-primary" id="btnFetch" onclick="fetchVideos()" disabled>📥 Fetch Videos</button>
      <button class="btn btn-record" id="btnRecord" onclick="startRecording()" disabled>🎙️ Record Voiceover</button>
      <button class="btn btn-primary" id="btnRender" onclick="renderVideo()" disabled>🎬 Render Video</button>
    </div>

    <div class="status-message" id="status"></div>
  </div>

  <div class="countdown-overlay" id="countdown"></div>

  <script>
    // ==================== CHAT ====================
    const chatMessages = [{
      role: 'system',
      content: 'You are a YouTube Shorts script expert. Write short, punchy scripts (max 60 seconds). Format as a single paragraph. Be creative and engaging.'
    }];

    function renderChat() {
      const c = document.getElementById('chatMessages');
      c.innerHTML = '';
      chatMessages.forEach(msg => {
        if (msg.role === 'system') return;
        const d = document.createElement('div');
        d.className = `message ${msg.role}`;
        d.textContent = msg.content;
        c.appendChild(d);
      });
      c.scrollTop = c.scrollHeight;
    }

    async function sendChat() {
      const input = document.getElementById('chatInput');
      const msg = input.value.trim();
      if (!msg) return;
      chatMessages.push({ role: 'user', content: msg });
      input.value = '';
      renderChat();
      const td = document.createElement('div');
      td.className = 'message assistant';
      td.innerHTML = '<span class="spinner"></span> Thinking...';
      td.id = 'typing';
      document.getElementById('chatMessages').appendChild(td);
      try {
        const r = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: chatMessages })
        });
        const d = await r.json();
        document.getElementById('typing')?.remove();
        if (d.choices?.[0]) chatMessages.push({ role: 'assistant', content: d.choices[0].message.content });
      } catch (e) {
        document.getElementById('typing')?.remove();
        chatMessages.push({ role: 'assistant', content: 'Connection error.' });
      }
      renderChat();
    }

    // ==================== STATE ====================
    let scenes = [];
    let videoClips = [];
    let recordedAudio = null;
    let videoDuration = 0;

    function updateStats() {
      const script = document.getElementById('scriptInput').value.trim();
      const chars = script.length;
      const dur = Math.min(60, Math.round(chars / 15));
      videoDuration = dur || 0;
      document.getElementById('estDuration').textContent = dur ? `${dur}s (max 60s)` : '—';
      document.getElementById('sceneCount').textContent = scenes.length || '—';
      document.getElementById('clipsFound').textContent = videoClips.filter(c=>c).length || '—';
    }

    document.getElementById('scriptInput').addEventListener('input', updateStats);

    // ==================== SCENES ====================
    async function extractScenes() {
      const script = document.getElementById('scriptInput').value.trim();
      if (!script) return alert('Paste your script first.');
      const btn = document.getElementById('btnScenes');
      const status = document.getElementById('status');
      btn.disabled = true;
      status.innerHTML = '<span class="spinner"></span> Analyzing script...';

      const charCount = script.length;
      const estDur = charCount / 15;
      const numScenes = Math.max(2, Math.min(5, Math.ceil(estDur / 5)));

      try {
        const r = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: [
              {
                role: 'system',
                content: `Extract exactly ${numScenes} visual scene descriptions (3-6 words each) from this script. Output one per line, no numbers, no extra text. Make them searchable stock footage keywords for Pexels.`
              },
              { role: 'user', content: script }
            ]
          })
        });
        const d = await r.json();
        if (d.choices?.[0]) {
          scenes = d.choices[0].message.content.split('\n').filter(l=>l.trim()).map(l=>l.replace(/^\d+[\.\)]\s*/,'').trim());
          renderScenes();
          document.getElementById('btnFetch').disabled = false;
          status.innerHTML = `✅ ${scenes.length} scenes extracted`;
        }
      } catch (e) {
        status.innerHTML = '❌ Failed to extract scenes';
      }
      btn.disabled = false;
      updateStats();
    }

    function renderScenes() {
      document.getElementById('sceneList').innerHTML = scenes.map((s,i) => `
        <div class="scene-item" id="scene-${i}">
          <span class="scene-num">${i+1}</span>
          <span>${s}</span>
          <span class="status-dot pending" id="dot-${i}"></span>
        </div>
      `).join('');
    }

    // ==================== PEXELS ====================
    async function fetchVideos() {
      if (!scenes.length) return;
      const btn = document.getElementById('btnFetch');
      const status = document.getElementById('status');
      btn.disabled = true;
      videoClips = new Array(scenes.length).fill(null);
      let count = 0;

      for (let i = 0; i < scenes.length; i++) {
        status.innerHTML = `<span class="spinner"></span> Fetching clip ${i+1}/${scenes.length}: "${scenes[i]}"...`;
        try {
          const r = await fetch(`/api/pexels/videos?query=${encodeURIComponent(scenes[i])}&per_page=1`);
          const d = await r.json();
          if (d.videos?.length) {
            const video = d.videos[0];
            const file = video.video_files.find(f=>f.width>=1080) || video.video_files.find(f=>f.width>=720) || video.video_files[0];
            if (file) {
              videoClips[i] = { url: file.link, duration: video.duration, id: video.id };
              count++;
              document.getElementById(`dot-${i}`).className = 'status-dot fetched';
              document.getElementById(`scene-${i}`)?.classList.add('found');
            }
          }
        } catch (e) {
          document.getElementById(`dot-${i}`).className = 'status-dot failed';
        }
      }

      status.innerHTML = count > 0 ? `✅ ${count}/${scenes.length} clips fetched` : '❌ No clips found';
      if (count > 0) document.getElementById('btnRecord').disabled = false;
      btn.disabled = false;
      updateStats();
    }

    // ==================== RECORDING ====================
    let mediaRecorder = null;
    let recordingChunks = [];
    let recordingTimer = null;
    let recordingSeconds = 0;

    async function startRecording() {
      if (!videoDuration) return alert('No video duration calculated. Paste a script first.');

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        const overlay = document.getElementById('countdown');
        overlay.style.display = 'block';
        for (let i = 3; i > 0; i--) {
          overlay.textContent = i;
          await new Promise(r => setTimeout(r, 1000));
        }
        overlay.textContent = '🎙️';
        await new Promise(r => setTimeout(r, 500));
        overlay.style.display = 'none';

        recordingChunks = [];
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
        mediaRecorder.ondataavailable = e => recordingChunks.push(e.data);
        mediaRecorder.onstop = () => {
          recordedAudio = new Blob(recordingChunks, { type: 'audio/webm' });
          stream.getTracks().forEach(t => t.stop());
          document.getElementById('btnRender').disabled = false;
          document.getElementById('status').innerHTML = `✅ Recording complete! (${recordingSeconds}s)`;
        };

        mediaRecorder.start();
        
        const btn = document.getElementById('btnRecord');
        btn.textContent = '⏺️ Recording...';
        btn.classList.add('recording');
        btn.onclick = stopRecording;
        
        document.getElementById('recordingBadge').style.display = 'flex';
        
        recordingSeconds = 0;
        document.getElementById('recordingTime').textContent = '0s';
        recordingTimer = setInterval(() => {
          recordingSeconds++;
          document.getElementById('recordingTime').textContent = `${recordingSeconds}s`;
          if (recordingSeconds >= videoDuration) {
            stopRecording();
          }
        }, 1000);

      } catch (e) {
        document.getElementById('status').innerHTML = '❌ Microphone access denied. Please allow microphone.';
      }
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        clearInterval(recordingTimer);
        
        const btn = document.getElementById('btnRecord');
        btn.textContent = '🎙️ Record Voiceover';
        btn.classList.remove('recording');
        btn.onclick = startRecording;
        document.getElementById('recordingBadge').style.display = 'none';
      }
    }

    // ==================== SERVER-SIDE RENDER ====================
    async function renderVideo() {
      const validClips = videoClips.filter(c => c);
      if (!validClips.length) return alert('No video clips to render.');
      if (!recordedAudio) return alert('Record your voiceover first.');

      const btn = document.getElementById('btnRender');
      const status = document.getElementById('status');
      btn.disabled = true;

      try {
        status.innerHTML = '<span class="spinner"></span> Uploading to server for rendering...';
        
        const formData = new FormData();
        formData.append('audio', recordedAudio, 'voice.webm');
        formData.append('clips', JSON.stringify(validClips.map(c => ({ url: c.url }))));
        formData.append('duration', videoDuration.toString());

        const response = await fetch('/api/render', {
          method: 'POST',
          body: formData
        });

        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.error || 'Server render failed');
        }

        // Download the video
        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `short_${Date.now()}.mp4`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        status.innerHTML = '✅ Video downloaded! Ready for YouTube Shorts.';
      } catch (e) {
        console.error(e);
        status.innerHTML = `❌ Error: ${e.message}`;
      }
      btn.disabled = false;
    }
  </script>
</body>
</html>
