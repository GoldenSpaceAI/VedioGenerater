<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shorts Forge — Faris</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #2a2a2a;
      --gold: #d4a53a;
      --gold-light: #e8c547;
      --gold-dark: #b8922e;
      --text: #e0e0e0;
      --text-muted: #777;
      --danger: #c0392b;
      --success: #27ae60;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
      letter-spacing: 0.01em;
    }

    /* ============ CHAT PANEL (30%) ============ */
    .chat-panel {
      width: 30%;
      min-width: 340px;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-right: 1px solid var(--border);
      position: relative;
    }

    .chat-header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(0,0,0,0.3);
    }

    .chat-header .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 8px rgba(39, 174, 96, 0.5);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .chat-header h3 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--gold);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .chat-messages::-webkit-scrollbar {
      width: 3px;
    }
    .chat-messages::-webkit-scrollbar-track {
      background: transparent;
    }
    .chat-messages::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .message {
      max-width: 88%;
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 12.5px;
      line-height: 1.6;
      word-wrap: break-word;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      background: linear-gradient(135deg, #1a1a1a, #1f1f1f);
      align-self: flex-end;
      border: 1px solid #333;
      border-radius: 14px 14px 4px 14px;
      color: #ddd;
    }

    .message.assistant {
      background: linear-gradient(135deg, #151515, #1a1a1a);
      align-self: flex-start;
      border: 1px solid #2a2a2a;
      border-radius: 14px 14px 14px 4px;
      border-left: 2px solid var(--gold-dark);
      color: #ccc;
    }

    .chat-input-area {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      background: rgba(0,0,0,0.2);
    }

    .chat-input-area input {
      flex: 1;
      padding: 11px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: #fff;
      border-radius: 24px;
      font-size: 12.5px;
      outline: none;
      transition: border 0.2s;
    }

    .chat-input-area input:focus {
      border-color: var(--gold-dark);
    }

    .chat-input-area input::placeholder {
      color: #444;
    }

    .btn-send {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-dark), var(--gold));
      color: #000;
      border: none;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, box-shadow 0.15s;
      flex-shrink: 0;
    }

    .btn-send:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(212, 165, 58, 0.3);
    }

    /* ============ VIDEO PANEL (70%) ============ */
    .video-panel {
      width: 70%;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 28px 32px;
      background: radial-gradient(ellipse at top right, #0f0f0f 0%, var(--bg) 60%);
    }

    .video-panel::-webkit-scrollbar {
      width: 4px;
    }
    .video-panel::-webkit-scrollbar-track {
      background: transparent;
    }
    .video-panel::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .brand-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--gold-dark), var(--gold));
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .brand h2 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .brand h2 span {
      color: var(--gold);
    }

    .section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--gold);
      margin-bottom: 8px;
      margin-top: 24px;
      font-weight: 600;
    }

    .section-label:first-of-type {
      margin-top: 0;
    }

    textarea {
      width: 100%;
      padding: 16px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: #ddd;
      border-radius: 10px;
      font-size: 13.5px;
      resize: vertical;
      min-height: 110px;
      font-family: inherit;
      outline: none;
      transition: border 0.2s;
      line-height: 1.6;
    }

    textarea:focus {
      border-color: var(--gold-dark);
    }

    textarea::placeholder {
      color: #3a3a3a;
    }

    .info-row {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .stat-badge {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 10px 18px;
      border-radius: 24px;
      font-size: 12px;
      color: #aaa;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stat-badge .value {
      color: var(--gold-light);
      font-weight: 600;
    }

    .scene-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 4px;
    }

    .scene-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 12px;
      color: #999;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: border 0.2s;
    }

    .scene-item.found {
      border-left: 3px solid var(--gold);
      color: #ccc;
    }

    .scene-item .scene-num {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: #888;
      flex-shrink: 0;
    }

    .scene-item.found .scene-num {
      background: var(--gold-dark);
      color: #000;
    }

    .scene-item .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-left: auto;
      flex-shrink: 0;
    }

    .status-dot.pending { background: #444; }
    .status-dot.fetched { background: var(--gold); }
    .status-dot.failed { background: var(--danger); }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .btn {
      padding: 12px 22px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.15s;
      font-family: inherit;
    }

    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--gold-dark), var(--gold));
      color: #000;
    }

    .btn-primary:hover:not(:disabled) {
      box-shadow: 0 0 24px rgba(212, 165, 58, 0.25);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: transparent;
      color: #ccc;
      border: 1px solid var(--border);
    }

    .btn-secondary:hover:not(:disabled) {
      border-color: var(--gold-dark);
      color: #fff;
    }

    .status-message {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 20px;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #333;
      border-top: 2px solid var(--gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    canvas {
      display: none;
    }

    @media (max-width: 800px) {
      body {
        flex-direction: column;
      }
      .chat-panel, .video-panel {
        width: 100%;
        min-width: unset;
      }
      .chat-panel {
        max-height: 35vh;
      }
    }
  </style>
</head>
<body>

  <!-- ============ CHAT PANEL (30%) ============ -->
  <div class="chat-panel">
    <div class="chat-header">
      <div class="dot"></div>
      <h3>AI Script Studio</h3>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="message assistant">
        👋 Hey Faris! I can help write scripts, titles, and hooks for your Shorts. Just tell me your topic.
      </div>
    </div>
    <div class="chat-input-area">
      <input type="text" id="chatInput" placeholder="Ask me anything..." onkeydown="if(event.key==='Enter')sendChat()">
      <button class="btn-send" onclick="sendChat()">➤</button>
    </div>
  </div>

  <!-- ============ VIDEO PANEL (70%) ============ -->
  <div class="video-panel">
    <div class="brand">
      <div class="brand-icon">⚡</div>
      <h2>Shorts <span>Forge</span></h2>
    </div>

    <div class="section-label">📝 Your Script</div>
    <textarea id="scriptInput" placeholder="Paste your voiceover script here...&#10;&#10;We'll extract scenes, fetch matching videos from Pexels, add voiceover, and stitch it into an MP4 for YouTube Shorts."></textarea>

    <div class="info-row">
      <div class="stat-badge">
        🎬 Scenes: <span class="value" id="sceneCount">—</span>
      </div>
      <div class="stat-badge">
        ⏱ Est. Duration: <span class="value" id="estDuration">—</span>
      </div>
      <div class="stat-badge">
        📹 Clips Fetched: <span class="value" id="clipsFound">—</span>
      </div>
    </div>

    <div class="section-label">🎞️ Scene Breakdown</div>
    <div class="scene-list" id="sceneList">
      <div class="scene-item">
        <span class="scene-num">—</span>
        Paste your script and generate scenes first
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="btnScenes" onclick="generateScenes()">🔍 Extract Scenes</button>
      <button class="btn btn-primary" id="btnFetch" onclick="fetchAllVideos()" disabled>📥 Fetch Videos</button>
      <button class="btn btn-primary" id="btnCreate" onclick="createVideo()" disabled>🎬 Render Video</button>
    </div>

    <div class="status-message" id="status"></div>

    <canvas id="videoCanvas" width="1080" height="1920"></canvas>
  </div>

  <!-- FFmpeg WASM -->
  <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.6/dist/umd/ffmpeg.js"></script>

  <script>
    // ==================== CHAT LOGIC ====================
    const chatMessages = [{
      role: 'system',
      content: 'You are a YouTube Shorts script expert. Help write short, punchy scripts (30-60 seconds). Format scripts as single paragraphs for voiceover. Suggest catchy titles. Be concise and creative.'
    }];

    function renderChat() {
      const container = document.getElementById('chatMessages');
      container.innerHTML = '';
      chatMessages.forEach(msg => {
        if (msg.role === 'system') return;
        const div = document.createElement('div');
        div.className = `message ${msg.role}`;
        div.textContent = msg.content;
        container.appendChild(div);
      });
      container.scrollTop = container.scrollHeight;
    }

    async function sendChat() {
      const input = document.getElementById('chatInput');
      const message = input.value.trim();
      if (!message) return;

      chatMessages.push({ role: 'user', content: message });
      input.value = '';
      renderChat();

      const typingDiv = document.createElement('div');
      typingDiv.className = 'message assistant';
      typingDiv.innerHTML = '<span class="spinner"></span> Thinking...';
      typingDiv.id = 'typingIndicator';
      document.getElementById('chatMessages').appendChild(typingDiv);

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: chatMessages })
        });
        const data = await res.json();
        document.getElementById('typingIndicator')?.remove();
        if (data.choices?.[0]) {
          chatMessages.push({ role: 'assistant', content: data.choices[0].message.content });
        }
      } catch (err) {
        document.getElementById('typingIndicator')?.remove();
        chatMessages.push({ role: 'assistant', content: 'Connection error. Try again.' });
      }
      renderChat();
    }

    // ==================== SCENE EXTRACTION ====================
    let scenes = [];
    let videoClips = [];

    function updateStats() {
      const script = document.getElementById('scriptInput').value.trim();
      const charCount = script.length;
      const estDur = Math.round(charCount / 15);
      document.getElementById('estDuration').textContent = estDur ? `${estDur}s (max 60s for Shorts)` : '—';
      document.getElementById('sceneCount').textContent = scenes.length || '—';
      const fetched = videoClips.filter(c => c).length;
      document.getElementById('clipsFound').textContent = fetched || '—';
    }

    document.getElementById('scriptInput').addEventListener('input', updateStats);

    async function generateScenes() {
      const script = document.getElementById('scriptInput').value.trim();
      if (!script) return alert('Paste your script first.');

      const btn = document.getElementById('btnScenes');
      const status = document.getElementById('status');
      btn.disabled = true;
      status.innerHTML = '<span class="spinner"></span> GPT is analyzing your script...';

      const charCount = script.length;
      const estDuration = charCount / 15;
      const numScenes = Math.max(2, Math.min(8, Math.ceil(estDuration / 5)));

      const sceneMessages = [
        {
          role: 'system',
          content: `Extract exactly ${numScenes} visual scene descriptions from this voiceover script. Each scene should be 3-6 words, describing a visual that would match that moment. Output ONLY the scenes, one per line like: "keyword1 keyword2 keyword3". No numbering, no extra text. Make them searchable stock footage terms for Pexels.`
        },
        { role: 'user', content: script }
      ];

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: sceneMessages })
        });
        const data = await res.json();

        if (data.choices?.[0]) {
          scenes = data.choices[0].message.content
            .split('\n')
            .filter(line => line.trim())
            .map(line => line.replace(/^\d+[\.\)]\s*/, '').trim());

          renderSceneList();
          document.getElementById('btnFetch').disabled = false;
          status.innerHTML = `✅ ${scenes.length} scenes extracted`;
        }
      } catch (err) {
        status.innerHTML = '❌ Failed to extract scenes';
      }

      btn.disabled = false;
      updateStats();
    }

    function renderSceneList() {
      const container = document.getElementById('sceneList');
      container.innerHTML = scenes.map((s, i) => `
        <div class="scene-item" id="scene-${i}">
          <span class="scene-num">${i + 1}</span>
          <span>${s}</span>
          <span class="status-dot pending" id="dot-${i}"></span>
        </div>
      `).join('');
    }

    // ==================== FETCH PEXELS VIDEOS ====================
    async function fetchAllVideos() {
      if (!scenes.length) return;

      const btn = document.getElementById('btnFetch');
      const status = document.getElementById('status');
      btn.disabled = true;
      videoClips = new Array(scenes.length).fill(null);
      let fetchedCount = 0;

      for (let i = 0; i < scenes.length; i++) {
        status.innerHTML = `<span class="spinner"></span> Fetching clip ${i + 1} of ${scenes.length}: "${scenes[i]}"...`;
        
        try {
          const res = await fetch(`/api/pexels/videos?query=${encodeURIComponent(scenes[i])}&per_page=1`);
          const data = await res.json();

          if (data.videos?.length > 0) {
            const video = data.videos[0];
            const file = video.video_files.find(f => f.width >= 1080) 
                      || video.video_files.find(f => f.width >= 720)
                      || video.video_files[0];
            
            if (file) {
              videoClips[i] = { url: file.link, duration: video.duration, id: video.id };
              fetchedCount++;
              document.getElementById(`dot-${i}`).className = 'status-dot fetched';
              document.getElementById(`scene-${i}`)?.classList.add('found');
            }
          }
        } catch (err) {
          document.getElementById(`dot-${i}`).className = 'status-dot failed';
        }
      }

      status.innerHTML = fetchedCount > 0 
        ? `✅ ${fetchedCount}/${scenes.length} clips fetched` 
        : '❌ No clips found. Try different scene keywords.';
      
      if (fetchedCount > 0) {
        document.getElementById('btnCreate').disabled = false;
      }
      
      btn.disabled = false;
      updateStats();
    }

    // ==================== FFMPEG MANAGEMENT ====================
    let ffmpegInstance = null;
    let ffmpegLoadPromise = null;

    async function getFFmpeg() {
      if (ffmpegInstance) {
        return ffmpegInstance;
      }
      
      if (ffmpegLoadPromise) {
        return ffmpegLoadPromise;
      }
      
      const status = document.getElementById('status');
      status.innerHTML = '<span class="spinner"></span> Loading video engine... (first time ~10s)';
      
      ffmpegLoadPromise = (async () => {
        try {
          const { FFmpeg } = FFmpegWASM;
          ffmpegInstance = new FFmpeg();
          await ffmpegInstance.load();
          console.log('FFmpeg loaded successfully');
          return ffmpegInstance;
        } catch (err) {
          ffmpegLoadPromise = null;
          throw err;
        }
      })();
      
      return ffmpegLoadPromise;
    }

    // ==================== TTS - Browser-based (always works) ====================
    async function generateTTSLocally(text) {
      // Load voices first
      return new Promise((resolve, reject) => {
        const loadVoices = () => {
          const voices = speechSynthesis.getVoices();
          if (voices.length > 0) {
            startTTS(voices);
          } else {
            speechSynthesis.onvoiceschanged = () => {
              startTTS(speechSynthesis.getVoices());
            };
          }
        };

        const startTTS = (voices) => {
          const utterance = new SpeechSynthesisUtterance(text);
          
          // Pick best available voice
          const preferred = voices.find(v => 
            v.name.includes('Google') || 
            v.name.includes('Samantha') || 
            v.name.includes('Karen') ||
            v.name.includes('Daniel')
          ) || voices.find(v => v.lang === 'en-US') || voices[0];
          
          if (preferred) utterance.voice = preferred;
          utterance.rate = 0.9;
          utterance.pitch = 1.0;
          utterance.volume = 1.0;

          // Record via AudioContext
          const audioCtx = new AudioContext();
          const dest = audioCtx.createMediaStreamDestination();
          const recorder = new MediaRecorder(dest.stream, { mimeType: 'audio/webm;codecs=opus' });
          const chunks = [];

          recorder.ondataavailable = e => chunks.push(e.data);
          recorder.onstop = () => {
            resolve(new Blob(chunks, { type: 'audio/webm' }));
            audioCtx.close();
          };
          recorder.onerror = reject;

          recorder.start();
          utterance.onend = () => {
            setTimeout(() => recorder.stop(), 200);
          };
          utterance.onerror = (e) => {
            recorder.stop();
            reject(e);
          };
          
          speechSynthesis.speak(utterance);
        };

        loadVoices();
      });
    }

    // ==================== VIDEO CREATION ====================
    async function createVideo() {
      const validClips = videoClips.filter(c => c);
      if (!validClips.length) {
        alert('No video clips to render. Fetch videos first.');
        return;
      }

      const btn = document.getElementById('btnCreate');
      const status = document.getElementById('status');
      btn.disabled = true;

      try {
        const script = document.getElementById('scriptInput').value.trim();
        const totalDuration = Math.min(60, Math.ceil(script.split(/\s+/).length / 2.5));
        const clipDuration = Math.ceil(totalDuration / validClips.length);

        // Step 1: Get FFmpeg instance
        const ff = await getFFmpeg();
        
        // Step 2: Generate TTS locally
        status.innerHTML = '<span class="spinner"></span> Generating voiceover (please allow microphone if prompted)...';
        const audioBlob = await generateTTSLocally(script);
        const audioArray = new Uint8Array(await audioBlob.arrayBuffer());
        await ff.writeFile('voiceover.webm', audioArray);
        status.innerHTML = '<span class="spinner"></span> Voiceover ready...';

        // Step 3: Download & process each clip
        for (let i = 0; i < validClips.length; i++) {
          status.innerHTML = `<span class="spinner"></span> Processing clip ${i + 1} of ${validClips.length}...`;
          
          const response = await fetch(validClips[i].url);
          const blob = await response.blob();
          const inputName = `raw_${i}.mp4`;
          const trimmedName = `clip_${i}.mp4`;
          
          await ff.writeFile(inputName, new Uint8Array(await blob.arrayBuffer()));
          
          await ff.exec([
            '-i', inputName,
            '-t', String(clipDuration),
            '-vf', 'scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920',
            '-c:v', 'libx264',
            '-preset', 'ultrafast',
            '-crf', '28',
            '-an',
            '-y',
            trimmedName
          ]);
        }

        // Step 4: Create concat file
        let concatList = validClips.map((_, i) => `file 'clip_${i}.mp4'`).join('\n');
        await ff.writeFile('list.txt', concatList);

        // Step 5: Merge everything
        status.innerHTML = '<span class="spinner"></span> Rendering final video for YouTube Shorts...';
        
        await ff.exec([
          '-f', 'concat',
          '-safe', '0',
          '-i', 'list.txt',
          '-i', 'voiceover.webm',
          '-c:v', 'libx264',
          '-preset', 'medium',
          '-crf', '23',
          '-c:a', 'aac',
          '-b:a', '128k',
          '-pix_fmt', 'yuv420p',
          '-movflags', '+faststart',
          '-shortest',
          '-y',
          'shorts_output.mp4'
        ]);

        // Step 6: Download
        const data = await ff.readFile('shorts_output.mp4');
        const videoBlob = new Blob([data.buffer], { type: 'video/mp4' });
        const url = URL.createObjectURL(videoBlob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `short_${Date.now()}.mp4`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        status.innerHTML = '✅ Video downloaded! Ready for YouTube Shorts.';
      } catch (err) {
        console.error('Video creation error:', err);
        status.innerHTML = `❌ Error: ${err.message}. Try fewer scenes or reload the page.`;
      }

      btn.disabled = false;
    }
  </script>
</body>
</html>
