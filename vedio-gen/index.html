<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shorts Forge — Simple</title>
  <style>
    :root {
      --bg: #000; --surface: #0d0d0d; --card: #141414;
      --border: #222; --gold: #f5c842; --gold-dark: #c49b20;
      --text: #f0f0f0; --muted: #888; --danger: #e74c3c; --success: #2ecc71;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .header { padding: 16px 20px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .header h1 { font-size: 15px; }
    .header span { color: var(--gold); }
    .container { max-width: 500px; margin: 0 auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
    .card-header { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); margin-bottom: 8px; font-weight: 700; }
    textarea { width: 100%; padding: 12px; background: var(--surface); border: 1px solid var(--border); color: #ddd; border-radius: 8px; font-size: 13px; resize: vertical; min-height: 80px; font-family: inherit; outline: none; }
    textarea:focus { border-color: var(--gold-dark); }
    .btn { padding: 12px; border: none; border-radius: 25px; cursor: pointer; font-weight: 700; font-size: 12px; text-transform: uppercase; width: 100%; }
    .btn-gold { background: linear-gradient(135deg, var(--gold-dark), var(--gold)); color: #000; }
    .btn-record { background: var(--danger); color: #fff; }
    .btn:disabled { opacity: 0.3; pointer-events: none; }
    .status { text-align: center; font-size: 12px; color: var(--muted); padding: 8px; }
    .status.success { color: var(--success); }
    .status.error { color: var(--danger); }
    .stats { display: flex; gap: 8px; }
    .stat { background: var(--surface); border: 1px solid var(--border); padding: 8px 12px; border-radius: 20px; font-size: 11px; color: #999; flex: 1; text-align: center; }
    .stat .val { color: var(--gold); font-weight: 700; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #333; border-top: 2px solid var(--gold); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎬 Shorts <span>Forge</span></h1>
    <a href="/images" style="margin-left:auto;color:var(--gold);font-size:12px;text-decoration:none;">🖼️ Image Tool →</a>
  </div>
  <div class="container">
    <div class="card">
      <div class="card-header">📝 Script</div>
      <textarea id="scriptInput" placeholder="Paste your script...&#10;Fixed 10s per clip, 6 clips max"></textarea>
    </div>
    <div class="stats">
      <div class="stat">🎬 <span class="val" id="sceneCount">0</span></div>
      <div class="stat">⏱ <span class="val" id="estDuration">0s</span></div>
      <div class="stat">📹 <span class="val" id="clipsFound">0</span></div>
    </div>
    <button class="btn btn-gold" id="btnScenes" onclick="extractScenes()">🔍 AI Extract (6 scenes)</button>
    <button class="btn btn-gold" id="btnFetch" onclick="fetchVideos()" disabled>📥 Fetch Videos</button>
    <button class="btn btn-record" id="btnRecord" onclick="startRecording()" disabled>🎙️ Record</button>
    <button class="btn btn-gold" id="btnRender" onclick="renderVideo()" disabled>🎬 Render</button>
    <div class="status" id="status">Ready</div>
  </div>
  <div id="countdown" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:72px;font-weight:900;color:var(--gold);z-index:999;"></div>
  
  <script>
    let scenes = [], videoClips = [], recordedAudio = null, videoDuration = 0, subtitles = [];
    
    document.getElementById('scriptInput').addEventListener('input', function() {
      const dur = Math.min(60, Math.round(this.value.length / 15));
      videoDuration = dur || 0;
      document.getElementById('estDuration').textContent = dur ? `${dur}s` : '0s';
    });

    async function extractScenes() {
      const script = document.getElementById('scriptInput').value.trim();
      if (!script) return alert('Paste script');
      const btn = document.getElementById('btnScenes'), status = document.getElementById('status');
      btn.disabled = true;
      status.innerHTML = '<span class="spinner"></span> AI reading...';
      
      const numScenes = 6;
      const totalDuration = numScenes * 10;
      
      try {
        const r = await fetch('/api/chat', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({messages: [
            {role:'system', content:`Return ${numScenes} Pexels search queries. One per line. 2-5 words. Match the script content.`},
            {role:'user', content: `Script:\n\n${script}\n\nReturn ${numScenes} queries:`}
          ]})
        });
        const d = await r.json();
        if (d.choices?.[0]) {
          scenes = d.choices[0].message.content.split('\n').map(l => l.replace(/^\d+[\.\)]\s*/, '').replace(/^[-*•]\s*/, '').trim()).filter(l => l.length > 2).slice(0, numScenes);
          while (scenes.length < numScenes) scenes.push('nature scenery');
          
          const words = script.split(/\s+/);
          subtitles = [];
          for (let i = 0; i < numScenes; i++) {
            const chunk = words.slice(i * 10, (i+1) * 10).join(' ');
            if (chunk) subtitles.push({ text: chunk, startTime: i*10, endTime: (i+1)*10 });
          }
          
          document.getElementById('sceneCount').textContent = scenes.length;
          document.getElementById('btnFetch').disabled = false;
          status.innerHTML = `✅ ${scenes.length} scenes`;
          status.className = 'status success';
        }
      } catch(e) { status.innerHTML = '❌ Failed'; status.className = 'status error'; }
      btn.disabled = false;
    }

    async function fetchVideos() {
      const btn = document.getElementById('btnFetch'), status = document.getElementById('status');
      btn.disabled = true;
      videoClips = new Array(6).fill(null);
      let count = 0;
      
      for (let i = 0; i < scenes.length; i++) {
        status.innerHTML = `<span class="spinner"></span> ${i+1}/${scenes.length}`;
        try {
          const r = await fetch(`/api/pexels/videos?query=${encodeURIComponent(scenes[i])}&per_page=1`);
          const d = await r.json();
          if (d.videos?.length) {
            const f = d.videos[0].video_files.find(x => x.width >= 720) || d.videos[0].video_files[0];
            if (f) { videoClips[i] = { url: f.link }; count++; }
          }
        } catch(e) {}
      }
      
      document.getElementById('clipsFound').textContent = count;
      document.getElementById('btnRecord').disabled = count === 0;
      status.innerHTML = count > 0 ? `✅ ${count} clips` : '❌ No clips';
      status.className = count > 0 ? 'status success' : 'status error';
      btn.disabled = false;
    }

    let mediaRecorder, recSeconds = 0, recTimer;

    async function startRecording() {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const overlay = document.getElementById('countdown');
      overlay.style.display = 'block';
      for (let i = 3; i > 0; i--) { overlay.textContent = i; await new Promise(r => setTimeout(r, 1000)); }
      overlay.textContent = '🎙️'; await new Promise(r => setTimeout(r, 500));
      overlay.style.display = 'none';
      
      const chunks = [];
      mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
      mediaRecorder.ondataavailable = e => chunks.push(e.data);
      mediaRecorder.onstop = () => {
        recordedAudio = new Blob(chunks, { type: 'audio/webm' });
        document.getElementById('btnRender').disabled = false;
        document.getElementById('status').innerHTML = `✅ Recorded ${recSeconds}s`;
        document.getElementById('status').className = 'status success';
      };
      mediaRecorder.start();
      
      const btn = document.getElementById('btnRecord');
      btn.textContent = '⏺️ Stop'; btn.classList.add('recording'); btn.onclick = stopRecording;
      
      recSeconds = 0;
      recTimer = setInterval(() => { recSeconds++; if (recSeconds >= 60) stopRecording(); }, 1000);
    }

    function stopRecording() {
      if (mediaRecorder) { mediaRecorder.stop(); clearInterval(recTimer); }
      const btn = document.getElementById('btnRecord');
      btn.textContent = '🎙️ Record'; btn.classList.remove('recording'); btn.onclick = startRecording;
    }

    async function renderVideo() {
      const valid = videoClips.filter(c => c);
      if (!valid.length) return alert('Fetch first');
      if (!recordedAudio) return alert('Record first');
      
      const btn = document.getElementById('btnRender'), status = document.getElementById('status');
      btn.disabled = true;
      status.innerHTML = '<span class="spinner"></span> Rendering...';
      
      try {
        const fd = new FormData();
        fd.append('audio', recordedAudio, 'voice.webm');
        fd.append('clips', JSON.stringify(valid.map(c => ({ url: c.url }))));
        fd.append('duration', '60');
        fd.append('subtitles', JSON.stringify(subtitles));
        
        const r = await fetch('/api/render', { method: 'POST', body: fd, signal: AbortSignal.timeout(300000) });
        if (!r.ok) throw new Error('Server error');
        
        const blob = await r.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = `short_${Date.now()}.mp4`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        status.innerHTML = '✅ Downloaded!';
        status.className = 'status success';
      } catch(e) {
        status.innerHTML = `❌ ${e.message}`;
        status.className = 'status error';
      }
      btn.disabled = false;
    }
  </script>
</body>
</html>
