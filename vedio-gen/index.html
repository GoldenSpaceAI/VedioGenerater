<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Shorts Forge — Faris</title>
  <style>
    :root {
      --bg: #000000;
      --surface: #0d0d0d;
      --card: #141414;
      --border: #222222;
      --gold: #f5c842;
      --gold-dark: #c49b20;
      --text: #f0f0f0;
      --muted: #888888;
      --danger: #e74c3c;
      --success: #2ecc71;
      --accent: #ff6b35;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* HEADER */
    .header {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--gold-dark), var(--gold));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .header h1 span { color: var(--gold); }

    .header .badge {
      margin-left: auto;
      background: var(--card);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 11px;
      color: var(--muted);
    }

    .header .badge.online {
      color: var(--success);
      border-color: #1a3a2a;
    }

    .header .badge.online::before {
      content: '';
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--success);
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* MAIN CONTAINER */
    .container {
      flex: 1;
      padding: 16px;
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* CARDS */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .card-header .icon {
      font-size: 18px;
    }

    .card-header .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--gold);
      font-weight: 700;
    }

    /* TEXTAREA */
    textarea {
      width: 100%;
      padding: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: #ddd;
      border-radius: 10px;
      font-size: 14px;
      resize: vertical;
      min-height: 100px;
      font-family: inherit;
      outline: none;
      transition: border 0.2s;
      line-height: 1.5;
    }

    textarea:focus { border-color: var(--gold-dark); }
    textarea::placeholder { color: #444; }

    /* STATS ROW */
    .stats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 8px 14px;
      border-radius: 25px;
      font-size: 11px;
      color: #999;
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      min-width: 80px;
      justify-content: center;
    }

    .stat .val {
      color: var(--gold);
      font-weight: 700;
      font-size: 13px;
    }

    /* SCENE LIST */
    .scene-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 250px;
      overflow-y: auto;
    }

    .scene-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }

    .scene-item .num {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: #888;
      flex-shrink: 0;
    }

    .scene-item.found .num {
      background: var(--gold-dark);
      color: #000;
    }

    .scene-item input {
      flex: 1;
      background: transparent;
      border: none;
      color: #ccc;
      font-size: 12px;
      outline: none;
      padding: 4px 0;
    }

    .scene-item .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot.pending { background: #444; }
    .dot.fetched { background: var(--gold); }
    .dot.failed { background: var(--danger); }

    /* SUBTITLE PREVIEW */
    .sub-preview {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      max-height: 150px;
      overflow-y: auto;
      font-size: 11px;
    }

    .sub-line {
      display: flex;
      gap: 8px;
      padding: 3px 0;
      border-bottom: 1px solid #1a1a1a;
      color: #aaa;
    }

    .sub-line .time {
      color: var(--gold);
      font-family: monospace;
      font-size: 10px;
      min-width: 55px;
    }

    /* BUTTONS */
    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 16px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-weight: 700;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: all 0.2s;
      flex: 1;
      min-width: 100px;
      text-align: center;
    }

    .btn:active { transform: scale(0.96); }

    .btn-gold {
      background: linear-gradient(135deg, var(--gold-dark), var(--gold));
      color: #000;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: #ccc;
    }

    .btn-outline.active {
      background: var(--gold-dark);
      color: #000;
      border-color: var(--gold);
    }

    .btn-record {
      background: var(--danger);
      color: #fff;
    }

    .btn-record.recording {
      animation: recPulse 1s infinite;
      background: #c0392b;
    }

    @keyframes recPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.5); }
      50% { box-shadow: 0 0 0 14px rgba(231, 76, 60, 0); }
    }

    .btn:disabled {
      opacity: 0.3;
      pointer-events: none;
    }

    /* INPUTS */
    .input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .input-row input {
      flex: 1;
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: #fff;
      border-radius: 25px;
      font-size: 13px;
      outline: none;
    }

    .input-row input:focus { border-color: var(--gold-dark); }
    .input-row input::placeholder { color: #444; }

    select {
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--gold);
      border-radius: 25px;
      font-size: 12px;
      font-weight: 600;
      outline: none;
      cursor: pointer;
    }

    /* STATUS */
    .status {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      padding: 8px;
      min-height: 20px;
    }

    .status.success { color: var(--success); }
    .status.error { color: var(--danger); }

    /* COUNTDOWN */
    .countdown {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 72px;
      font-weight: 900;
      color: var(--gold);
      z-index: 999;
      display: none;
      text-shadow: 0 0 50px rgba(245, 200, 66, 0.5);
      pointer-events: none;
    }

    /* SPINNER */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid #333;
      border-top: 2px solid var(--gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* MOBILE */
    @media (max-width: 400px) {
      .container { padding: 10px; gap: 10px; }
      .card { padding: 12px; border-radius: 10px; }
      .btn { padding: 10px 12px; font-size: 11px; }
      .stats { gap: 4px; }
      .stat { padding: 6px 10px; font-size: 10px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="logo">⚡</div>
    <h1>Shorts <span>Forge</span></h1>
    <div class="badge online">Ready</div>
  </div>

  <!-- MAIN -->
  <div class="container">

    <!-- SCRIPT CARD -->
    <div class="card">
      <div class="card-header">
        <span class="icon">📝</span>
        <span class="label">Your Script</span>
      </div>
      <textarea id="scriptInput" placeholder="Paste your voiceover script here...&#10;&#10;AI will extract scenes & generate subtitles"></textarea>
    </div>

    <!-- STATS -->
    <div class="stats">
      <div class="stat">🎬 <span class="val" id="sceneCount">0</span> scenes</div>
      <div class="stat">⏱ <span class="val" id="estDuration">0s</span></div>
      <div class="stat">📹 <span class="val" id="clipsFound">0</span> clips</div>
      <div class="stat">📝 <span class="val" id="subCount">0</span> subs</div>
    </div>

    <!-- CONTROLS -->
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
      <span style="font-size:11px;color:var(--muted);">Sec/scene:</span>
      <select id="secPerClip" onchange="updateStats()">
        <option value="3">3s</option>
        <option value="5" selected>5s</option>
        <option value="7">7s</option>
      </select>
      <button class="btn btn-outline active" id="btnSubToggle" onclick="toggleSubtitles()" style="flex:0;min-width:auto;padding:8px 14px;">💬 Subs: ON</button>
      <button class="btn btn-outline" id="btnAudioToggle" onclick="toggleAudio()" style="flex:0;min-width:auto;padding:8px 14px;">🎤 Audio: ON</button>
    </div>

    <!-- END SCREEN TEXT -->
    <div class="card">
      <div class="card-header">
        <span class="icon">💬</span>
        <span class="label">End Screen Text</span>
      </div>
      <div class="input-row">
        <input type="text" id="endTextInput" placeholder="e.g. SUBSCRIBE! 🔔" maxlength="30">
      </div>
    </div>

    <!-- SCENE LIST -->
    <div class="card">
      <div class="card-header">
        <span class="icon">🎞️</span>
        <span class="label">Scene Breakdown</span>
      </div>
      <div class="scene-list" id="sceneList">
        <div style="color:#555;font-size:12px;padding:8px;text-align:center;">⬆️ Paste script & extract scenes</div>
      </div>
    </div>

    <!-- SUBTITLE PREVIEW -->
    <div class="card">
      <div class="card-header">
        <span class="icon">📝</span>
        <span class="label">Subtitle Preview</span>
      </div>
      <div class="sub-preview" id="subtitlePreview">
        <div style="color:#555;font-size:11px;text-align:center;">Subtitles appear here...</div>
      </div>
    </div>

    <!-- BUTTONS -->
    <div class="btn-row">
      <button class="btn btn-gold" id="btnScenes" onclick="extractScenes()">🔍 Extract</button>
      <button class="btn btn-gold" id="btnFetch" onclick="fetchVideos()" disabled>📥 Fetch</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-record" id="btnRecord" onclick="startRecording()" disabled>🎙️ Record</button>
      <button class="btn btn-gold" id="btnRender" onclick="renderVideo()" disabled>🎬 Render</button>
    </div>

    <!-- STATUS -->
    <div class="status" id="status">Ready to create ✨</div>
  </div>

  <!-- COUNTDOWN OVERLAY -->
  <div class="countdown" id="countdown"></div>

  <script>
    // ==================== STATE ====================
    let scenes = [];
    let videoClips = [];
    let recordedAudio = null;
    let videoDuration = 0;
    let subtitles = [];
    let subtitlesEnabled = true;
    let audioEnabled = true;

    function updateStats() {
      const script = document.getElementById('scriptInput').value.trim();
      const chars = script.length;
      const dur = Math.min(60, Math.round(chars / 15));
      videoDuration = dur || 0;
      document.getElementById('estDuration').textContent = dur ? `${dur}s` : '0s';
      document.getElementById('sceneCount').textContent = scenes.length;
      document.getElementById('clipsFound').textContent = videoClips.filter(c => c).length;
      document.getElementById('subCount').textContent = subtitlesEnabled ? subtitles.length : 'OFF';
    }

    document.getElementById('scriptInput').addEventListener('input', updateStats);

    // ==================== TOGGLES ====================
    function toggleSubtitles() {
      subtitlesEnabled = !subtitlesEnabled;
      const btn = document.getElementById('btnSubToggle');
      btn.textContent = `💬 Subs: ${subtitlesEnabled ? 'ON' : 'OFF'}`;
      btn.classList.toggle('active', subtitlesEnabled);
      renderSubPreview();
      updateStats();
    }

    function toggleAudio() {
      audioEnabled = !audioEnabled;
      const btn = document.getElementById('btnAudioToggle');
      btn.textContent = `🎤 Audio: ${audioEnabled ? 'ON' : 'OFF'}`;
      btn.classList.toggle('active', audioEnabled);
      if (!audioEnabled) {
        recordedAudio = null;
        document.getElementById('btnRender').disabled = false;
        document.getElementById('status').textContent = '🔇 Audio off — video will be silent';
        document.getElementById('status').className = 'status';
      } else {
        document.getElementById('btnRender').disabled = !recordedAudio;
      }
      updateRecordBtn();
    }

    function updateRecordBtn() {
      const btn = document.getElementById('btnRecord');
      if (audioEnabled && scenes.length > 0) {
        btn.disabled = false;
      } else if (!audioEnabled) {
        btn.disabled = true;
        btn.textContent = '🎙️ Record';
        btn.classList.remove('recording');
      }
    }

    // ==================== SUBTITLES ====================
    function generateSubtitles(script, numScenes, totalDuration) {
      if (!subtitlesEnabled) return [];
      const words = script.split(/\s+/).filter(w => w.length > 0);
      if (!words.length) return [];
      const MAX_CHUNK = 4;
      const wordsPerChunk = Math.floor(MAX_CHUNK * 2.5);
      const subs = [];
      let t = 0, i = 0;
      while (i < words.length && t < totalDuration) {
        const chunk = words.slice(i, i + wordsPerChunk);
        if (!chunk.length) break;
        subs.push({ text: chunk.join(' '), startTime: t, endTime: Math.min(t + MAX_CHUNK, totalDuration) });
        i += wordsPerChunk;
        t += MAX_CHUNK;
      }
      return subs;
    }

    function renderSubPreview() {
      const c = document.getElementById('subtitlePreview');
      if (!subtitlesEnabled) { c.innerHTML = '<div style="color:#555;text-align:center;">🚫 Subtitles OFF</div>'; return; }
      if (!subtitles.length) { c.innerHTML = '<div style="color:#555;text-align:center;">Extract scenes first...</div>'; return; }
      c.innerHTML = subtitles.map(s =>
        `<div class="sub-line"><span class="time">${s.startTime.toFixed(0)}s</span><span>${s.text}</span></div>`
      ).join('');
    }

    // ==================== EXTRACT SCENES ====================
    async function extractScenes() {
      const script = document.getElementById('scriptInput').value.trim();
      if (!script) return alert('Paste your script first.');
      const btn = document.getElementById('btnScenes');
      const status = document.getElementById('status');
      btn.disabled = true;
      status.innerHTML = '<span class="spinner"></span> Analyzing...';
      status.className = 'status';

      const secPerClip = parseInt(document.getElementById('secPerClip').value) || 5;
      const estDur = Math.min(60, Math.ceil(script.length / 15));
      const numScenes = Math.max(2, Math.min(10, Math.ceil(estDur / secPerClip)));
      const totalDuration = numScenes * secPerClip;

      try {
        const r = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: [
              { role: 'system', content: `Extract exactly ${numScenes} scene keywords from this script. Output ONE per line (2-5 words). Match the actual content. No numbers.` },
              { role: 'user', content: `Extract ${numScenes} scenes:\n\n${script}` }
            ]
          })
        });
        const d = await r.json();
        if (d.choices?.[0]) {
          scenes = d.choices[0].message.content.split('\n')
            .map(l => l.replace(/^\d+[\.\)]\s*/, '').replace(/^[-*]\s*/, '').trim())
            .filter(l => l.length > 0 && l.length < 100)
            .slice(0, numScenes);
          
          // ENSURE exact number of scenes
          while (scenes.length < numScenes) scenes.push('nature scenery');
          scenes = scenes.slice(0, numScenes);
          
          subtitles = generateSubtitles(script, scenes.length, totalDuration);
          renderScenes();
          renderSubPreview();
          document.getElementById('btnFetch').disabled = false;
          updateRecordBtn();
          status.textContent = `✅ ${scenes.length} scenes ready`;
          status.className = 'status success';
        }
      } catch (e) {
        status.textContent = '❌ Failed to extract scenes';
        status.className = 'status error';
      }
      btn.disabled = false;
      updateStats();
    }

    function renderScenes() {
      document.getElementById('sceneList').innerHTML = scenes.map((s, i) => `
        <div class="scene-item" id="scene-${i}">
          <span class="num">${i+1}</span>
          <input type="text" value="${s}" id="keyword-${i}" onchange="updateKeyword(${i},this.value)">
          <span class="dot pending" id="dot-${i}"></span>
        </div>
      `).join('');
    }

    function updateKeyword(i, v) { scenes[i] = v.trim(); }

    // ==================== FETCH VIDEOS ====================
    async function fetchVideos() {
      if (!scenes.length) return;
      const btn = document.getElementById('btnFetch');
      const status = document.getElementById('status');
      btn.disabled = true;
      videoClips = new Array(scenes.length).fill(null);
      let count = 0;

      for (let i = 0; i < scenes.length; i++) {
        status.innerHTML = `<span class="spinner"></span> Fetching ${i+1}/${scenes.length}...`;
        status.className = 'status';
        try {
          const r = await fetch(`/api/pexels/videos?query=${encodeURIComponent(scenes[i])}&per_page=1`);
          const d = await r.json();
          if (d.videos?.length) {
            const v = d.videos[0];
            const f = v.video_files.find(x => x.width >= 1080) || v.video_files.find(x => x.width >= 720) || v.video_files[0];
            if (f) {
              videoClips[i] = { url: f.link, duration: v.duration };
              count++;
              document.getElementById(`dot-${i}`).className = 'dot fetched';
              document.getElementById(`scene-${i}`).classList.add('found');
            }
          }
        } catch (e) {
          document.getElementById(`dot-${i}`).className = 'dot failed';
        }
      }

      if (count > 0) {
        updateRecordBtn();
        status.textContent = `✅ ${count}/${scenes.length} clips fetched`;
        status.className = 'status success';
      } else {
        status.textContent = '❌ No clips found';
        status.className = 'status error';
      }
      btn.disabled = false;
      updateStats();
    }

    // ==================== RECORDING ====================
    let mediaRecorder, recordingChunks = [], recordingTimer, recordingSeconds = 0;

    async function startRecording() {
      if (!videoDuration) return alert('Paste script first.');
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        const overlay = document.getElementById('countdown');
        overlay.style.display = 'block';
        for (let i = 3; i > 0; i--) { overlay.textContent = i; await new Promise(r => setTimeout(r, 1000)); }
        overlay.textContent = '🎙️'; await new Promise(r => setTimeout(r, 500));
        overlay.style.display = 'none';

        recordingChunks = [];
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
        mediaRecorder.ondataavailable = e => recordingChunks.push(e.data);
        mediaRecorder.onstop = () => {
          recordedAudio = new Blob(recordingChunks, { type: 'audio/webm' });
          stream.getTracks().forEach(t => t.stop());
          document.getElementById('btnRender').disabled = false;
          document.getElementById('status').textContent = `✅ Recorded (${recordingSeconds}s)`;
          document.getElementById('status').className = 'status success';
        };
        mediaRecorder.start();

        const btn = document.getElementById('btnRecord');
        btn.textContent = '⏺️ Stop'; btn.classList.add('recording'); btn.onclick = stopRecording;

        recordingSeconds = 0;
        recordingTimer = setInterval(() => {
          recordingSeconds++;
          if (recordingSeconds >= videoDuration) stopRecording();
        }, 1000);
      } catch (e) {
        document.getElementById('status').textContent = '❌ Mic denied';
        document.getElementById('status').className = 'status error';
      }
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        clearInterval(recordingTimer);
        const btn = document.getElementById('btnRecord');
        btn.textContent = '🎙️ Record'; btn.classList.remove('recording'); btn.onclick = startRecording;
      }
    }

    // ==================== RENDER ====================
    async function renderVideo() {
      const validClips = videoClips.filter(c => c);
      if (!validClips.length) return alert('No clips. Fetch first.');
      if (audioEnabled && !recordedAudio) return alert('Record first or disable audio.');

      const btn = document.getElementById('btnRender');
      const status = document.getElementById('status');
      btn.disabled = true;
      status.innerHTML = '<span class="spinner"></span> Rendering...';
      status.className = 'status';

      try {
        const formData = new FormData();
        
        if (recordedAudio && audioEnabled) {
          formData.append('audio', recordedAudio, 'voice.webm');
        }
        
        formData.append('clips', JSON.stringify(validClips.map(c => ({ url: c.url }))));
        formData.append('duration', videoDuration.toString());
        formData.append('subtitles', JSON.stringify(subtitlesEnabled ? subtitles : []));
        formData.append('endText', document.getElementById('endTextInput').value.trim());

        const r = await fetch('/api/render', { method: 'POST', body: formData });
        if (!r.ok) { const e = await r.json(); throw new Error(e.error); }

        const blob = await r.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `short_${Date.now()}.mp4`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);

        status.textContent = '✅ Downloaded! Ready for YouTube';
        status.className = 'status success';
      } catch (e) {
        status.textContent = `❌ ${e.message}`;
        status.className = 'status error';
      }
      btn.disabled = false;
    }
  </script>
</body>
</html>
